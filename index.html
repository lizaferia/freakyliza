```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Something for my favorite humans</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Manrope',sans-serif;
background:linear-gradient(180deg,#fffdfd,#ffeef4,#fffafc);
overflow-x:hidden;
text-align:center;
color:#6e5962;
}

.page{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
}

.hidden{
display:none;
}

h1{
font-family:'DM Serif Display',serif;
font-size:55px;
font-weight:400;
color:#b5748d;
margin:0;
}

h2{
font-size:30px;
font-weight:600;
}

p{
font-size:20px;
}

.envelope{
font-size:140px;
cursor:pointer;
animation:float 3s infinite ease-in-out;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-15px);
}

}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin:40px 0;
}

.photo{
width:210px;
height:270px;
object-fit:cover;
background:white;
padding:12px;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,.12);
opacity:0;
animation:appear .8s forwards;
}

.photo:nth-child(1){animation-delay:.3s;}
.photo:nth-child(2){animation-delay:1s;}
.photo:nth-child(3){animation-delay:1.7s;}
.photo:nth-child(4){animation-delay:2.4s;}
.photo:nth-child(5){animation-delay:3.1s;}

@keyframes appear{

from{
opacity:0;
transform:translateY(30px) scale(.8);
}

to{
opacity:1;
transform:translateY(0) scale(1);
}

}

button{

padding:15px 28px;

margin:10px;

border:none;

border-radius:40px;

font-size:18px;

font-weight:700;

cursor:pointer;

background:#ebb8c8;

color:white;

}

button:hover{

transform:scale(1.05);

}

.ribbon{

position:fixed;

font-size:20px;

opacity:.25;

pointer-events:none;

animation:fall linear infinite;

}

@keyframes fall{

from{
transform:translateY(-100px);
}

to{
transform:translateY(110vh);
}

}

.final-photo{

width:340px;

border-radius:25px;

margin-top:20px;

box-shadow:0 12px 30px rgba(0,0,0,.15);

}

</style>
</head>

<body>

<div id="home" class="page">

<h1>Something for my favorite humans</h1>

<p>Click me</p>

<div class="envelope" onclick="openLetter()">
💌
</div>

</div>

<div id="main" class="page hidden">

<div class="gallery">

<img class="photo" src="photo1.jpg.heic">

<img class="photo" src="photo2.jpg.heic">

<img class="photo" src="photo3.jpg.heic">

<img class="photo" src="photo4.jpg.heic">

<img class="photo" src="photo5.jpg.JPG">

</div>

<h2>I love you now and forever</h2>

<div id="q1">

<p>Do you guys love me back?</p>

<button onclick="question2()">Yes</button>

<button onclick="wrong()">No</button>

</div>

<div id="q2" class="hidden">

<p>Will you love me forever?</p>

<button onclick="question3()">Yes</button>

<button onclick="wrong()">No</button>

</div>

<div id="q3" class="hidden">

<p>Will you guys replace me with another friend?</p>

<button onclick="finish()">No</button>

<button onclick="wrong()">Yes</button>

</div>

<div id="end" class="hidden">

<h2>Yes, thank you. I'm your freaky Liza.</h2>

<img class="final-photo" src="final.jpg.WEBP">

</div>

</div>

<script>

function openLetter(){

document.getElementById('home').classList.add('hidden');

document.getElementById('main').classList.remove('hidden');

}

function question2(){

document.getElementById('q1').classList.add('hidden');

document.getElementById('q2').classList.remove('hidden');

}

function question3(){

document.getElementById('q2').classList.add('hidden');

document.getElementById('q3').classList.remove('hidden');

}

function finish(){

document.getElementById('q3').classList.add('hidden');

document.getElementById('end').classList.remove('hidden');

}

function wrong(){

alert('Try again');

}

for(let i=0;i<40;i++){

let r=document.createElement('div');

r.className='ribbon';

r.innerHTML='♡';

r.style.left=Math.random()*100+'%';

r.style.animationDuration=(4+Math.random()*5)+'s';

document.body.appendChild(r);

}

</script>

</body>
</html>
```
